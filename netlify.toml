[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/creator"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/creator/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/:handle"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200